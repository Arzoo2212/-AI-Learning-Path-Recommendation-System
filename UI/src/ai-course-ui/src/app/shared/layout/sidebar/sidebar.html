<aside class="sidebar" [class.collapsed]="collapsed()">

  <!-- Brand + Collapse Toggle -->
  <div class="sidebar-brand">
    <div class="brand-left">
      <div class="brand-logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-orbit-icon lucide-orbit"><path d="M20.341 6.484A10 10 0 0 1 10.266 21.85"/><path d="M3.659 17.516A10 10 0 0 1 13.74 2.152"/><circle cx="12" cy="12" r="3"/><circle cx="19" cy="5" r="2"/><circle cx="5" cy="19" r="2"/></svg>
      </div>
      <div class="brand-text">
        <span class="brand-name">LearnPath AI</span>
        <span class="brand-sub">Enterprise Learning</span>
      </div>
    </div>
    <button class="collapse-btn" (click)="toggleCollapse()" title="Toggle sidebar">
      <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        @if (collapsed()) {
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"/>
        } @else {
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7M19 19l-7-7 7-7"/>
        }
      </svg>
    </button>
  </div>

  <!-- Section: Main -->
  <div class="nav-section">
    <p class="nav-section-label">MAIN</p>
    <nav class="nav-list">
      @for (item of navItems; track item.route) {
        <a [routerLink]="item.route" routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
          class="nav-item" [title]="item.label">
          <span class="nav-icon" [innerHTML]="item.icon"></span>
          <span class="nav-label">{{ item.label }}</span>
        </a>
      }
    </nav>
  </div>

  <!-- Spacer -->
  <div class="sidebar-spacer"></div>

  <!-- Divider -->
  <div class="nav-divider"></div>

  <!-- Footer: Profile + Sign Out -->
  <div class="sidebar-footer">
    <a routerLink="/profile" routerLinkActive="active" class="nav-item footer-item" title="My Profile">
      <span class="nav-icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
      </span>
      <span class="nav-label">My Profile</span>
    </a>
    <button (click)="logout()" class="nav-item footer-item signout-btn" title="Sign out">
      <span class="nav-icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
      </span>
      <span class="nav-label">Sign out</span>
    </button>
  </div>

</aside>
