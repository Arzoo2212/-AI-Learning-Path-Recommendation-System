<aside class="w-64 bg-white border-r border-gray-200 flex flex-col">
  <!-- Logo -->
  <div class="flex items-center gap-3 px-6 py-5 border-b border-gray-200">
    <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center">
      <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
      </svg>
    </div>
    <div>
      <p class="text-sm font-bold text-gray-900">LearnPath AI</p>
      <p class="text-xs text-gray-500">Corporate Learning</p>
    </div>
  </div>

  <!-- Nav -->
  <nav class="flex-1 px-3 py-4 space-y-1">
    @for (item of navItems; track item.route) {
      <a [routerLink]="item.route" routerLinkActive="bg-indigo-50 text-indigo-700 font-semibold"
        [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-600 hover:bg-gray-100 transition-colors group">
        <span class="w-5 h-5 flex-shrink-0" [innerHTML]="item.icon"></span>
        {{ item.label }}
      </a>
    }
  </nav>

  <!-- Bottom -->
  <div class="px-3 py-4 border-t border-gray-200">
    <a routerLink="/profile"
      class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-600 hover:bg-gray-100 transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
      </svg>
      My Profile
    </a>
  </div>
</aside>
